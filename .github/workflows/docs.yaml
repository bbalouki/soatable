name: Docs

on:
  push:
    branches: [ main ]

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Enable Pages with the "GitHub Actions" source programmatically so deploy-pages can create a
    # deployment; without this the site must be switched to GitHub Actions in repo settings first,
    # otherwise createPagesDeployment returns 404 ("Ensure GitHub Pages has been enabled").
    - name: Setup Pages
      uses: actions/configure-pages@v5
      with:
        enablement: true

    - name: Install Doxygen
      run: sudo apt-get update && sudo apt-get install -y doxygen

    - name: Generate API documentation
      run: |
        cmake -S . -B build-docs \
          -DSOATABLE_BUILD_DOCUMENTATION=ON \
          -DSOATABLE_BUILD_TESTS=OFF \
          -DSOATABLE_BUILD_EXAMPLES=OFF \
          -DSOATABLE_BUILD_BENCHMARKS=OFF
        cmake --build build-docs --target docs

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: build-docs/doxygen/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
