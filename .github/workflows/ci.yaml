name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Ubuntu GCC 13",
              os: ubuntu-latest,
              cxx: g++-13,
              preset: gcc
            }
          - {
              name: "Ubuntu Clang 18",
              os: ubuntu-latest,
              cxx: clang++-18,
              preset: clang
            }
          - {
              name: "Ubuntu Clang 18 (ASan+UBSan)",
              os: ubuntu-latest,
              cxx: clang++-18,
              preset: asan-ubsan
            }
          - {
              name: "Windows MSVC",
              os: windows-latest,
              cxx: cl,
              preset: msvc
            }

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        if [ "${{ matrix.config.cxx }}" = "g++-13" ]; then
          sudo apt-get install -y g++-13
        else
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-18
        fi

    - name: Configure CMake
      run: |
        # Linux legs pin the exact compiler version on top of the generic preset; Windows uses the
        # multi-config MSVC preset as-is.
        if [ "${{ runner.os }}" = "Windows" ]; then
          cmake --preset ${{ matrix.config.preset }}
        else
          cmake --preset ${{ matrix.config.preset }} -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }}
        fi
      shell: bash

    - name: Build
      run: cmake --build --preset ${{ matrix.config.preset }}
      shell: bash

    - name: Run Tests
      run: |
        # Treat any sanitizer finding as a hard failure.
        export ASAN_OPTIONS=halt_on_error=1:abort_on_error=1
        export UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1
        ctest --preset ${{ matrix.config.preset }}
      shell: bash
