name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Ubuntu GCC 13",
              os: ubuntu-latest,
              cxx: g++-13,
              preset: gcc
            }
          - {
              name: "Ubuntu Clang 18",
              os: ubuntu-latest,
              cxx: clang++-18,
              preset: clang
            }
          - {
              name: "Ubuntu Clang 18 (ASan+UBSan)",
              os: ubuntu-latest,
              cxx: clang++-18,
              preset: asan-ubsan
            }
          - {
              name: "Windows MSVC",
              os: windows-latest,
              cxx: cl,
              preset: msvc
            }

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        if [ "${{ matrix.config.cxx }}" = "g++-13" ]; then
          sudo apt-get install -y g++-13
        else
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-18
        fi

    - name: Configure CMake
      run: |
        # Linux legs pin the exact compiler version on top of the generic preset; Windows uses the
        # multi-config MSVC preset as-is.
        if [ "${{ runner.os }}" = "Windows" ]; then
          cmake --preset ${{ matrix.config.preset }}
        else
          cmake --preset ${{ matrix.config.preset }} -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }}
        fi
      shell: bash

    - name: Build
      run: cmake --build --preset ${{ matrix.config.preset }}
      shell: bash

    - name: Run Tests
      run: |
        # Treat any sanitizer finding as a hard failure.
        export ASAN_OPTIONS=halt_on_error=1:abort_on_error=1
        export UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1
        ctest --preset ${{ matrix.config.preset }}
      shell: bash

  amalgamation:
    name: Amalgamated single-header compiles
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install GCC 13
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-13

    - name: Generate and compile the amalgamated headers
      shell: bash
      run: |
        # The single-header drop-in is generated by scripts/amalgamate.py and is not exercised by the
        # build/test matrix above, so verify here that the stitched header still compiles on its own.
        # This catches a new "soatable/..." include or construct the amalgamator mishandles.
        set -euo pipefail

        # Core only, and the full bundle with every opt-in add-on inlined.
        python3 scripts/amalgamate.py --output dist/soatable_core.hpp
        python3 scripts/amalgamate.py --with all --output dist/soatable_full.hpp

        # Each generated header must compile as a standalone translation unit.
        for hdr in dist/soatable_core.hpp dist/soatable_full.hpp; do
          printf '#include "%s"\nint main() { return 0; }\n' "$hdr" > tu.cpp
          g++-13 -std=c++23 -Wall -Wextra -c tu.cpp -o tu.o
          echo "OK: ${hdr} compiles as a single header"
        done
